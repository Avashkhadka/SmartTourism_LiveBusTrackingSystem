version:'3.8'

services:
  web:
    build:.
    container_name:apache_php_app
    ports:
      - "8080:80"
    volumes:
      - ./php:/var/www/html
    depends_on:
      - db
  
  db:
    image:mysql:8.0
    container_name
    restart:always
    environment:
      MYSQL_ROOT_PASSWORD:root
      MYSQL_DATABASE: student_db
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.ssql
volumes:
  db_data: